global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "fraud-scoring"
    static_configs:
      - targets: ["scoring-service:8080"]
    metrics_path: /metrics

  - job_name: "fraud-enrichment"
    static_configs:
      - targets: ["enrichment-service:8081"]
    metrics_path: /metrics
