# ---------------------------------------------------------------------------
# Istio VirtualService: Shadow (Mirror) Deployment for Fraud Scoring
# ---------------------------------------------------------------------------
# Mirrors 100% of production traffic to the candidate model for validation.
# The candidate receives real requests but its responses are discarded by the
# Envoy sidecar -- there is zero impact on production latency or outcomes.
#
# Workflow:
#   1. Deploy candidate model as a separate K8s Service.
#   2. Apply this VirtualService to start mirroring.
#   3. After the validation window (typically 1 week), compare shadow metrics
#      against production in Grafana.
#   4. If shadow metrics are acceptable, proceed to canary rollout.
#   5. Delete this VirtualService to stop mirroring.
#
# Cleanup:
#   kubectl delete virtualservice fraud-scoring-shadow -n fraud-production
#   kubectl delete deployment fraud-scoring-candidate -n fraud-production
#   kubectl delete service fraud-scoring-candidate -n fraud-production
# ---------------------------------------------------------------------------

apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: fraud-scoring-shadow
  namespace: fraud-production
  labels:
    app.kubernetes.io/name: fraud-detection
    app.kubernetes.io/component: shadow-deployment
    app.kubernetes.io/part-of: fraud-detection-mlops
    app.kubernetes.io/managed-by: kubectl
    fraud-detection/deployment-mode: shadow
  annotations:
    description: >
      Mirrors 100% of production scoring traffic to the candidate model.
      Candidate responses are discarded; production is unaffected.
spec:
  hosts:
    - fraud-detection-scoring
  gateways:
    - mesh
  http:
    # -----------------------------------------------------------------
    # Primary route: all traffic goes to the current production model
    # -----------------------------------------------------------------
    - route:
        - destination:
            host: fraud-detection-scoring
            port:
              number: 8080
          weight: 100
      # -----------------------------------------------------------------
      # Shadow route: mirror 100% of traffic to the candidate model
      # Envoy sends a copy of every request to the mirror destination.
      # Responses from the mirror are discarded and never returned to
      # the caller.
      # -----------------------------------------------------------------
      mirror:
        host: fraud-scoring-candidate
        port:
          number: 8080
      mirrorPercentage:
        value: 100.0
      timeout: 5s
      retries:
        attempts: 2
        perTryTimeout: 2s
        retryOn: 5xx

---
# ---------------------------------------------------------------------------
# Candidate Service (receives mirrored traffic)
# ---------------------------------------------------------------------------
# Deploy the candidate model behind this Service before applying the
# VirtualService above.  The candidate MUST expose the same /score and
# /score/batch endpoints as production.
# ---------------------------------------------------------------------------

apiVersion: v1
kind: Service
metadata:
  name: fraud-scoring-candidate
  namespace: fraud-production
  labels:
    app.kubernetes.io/name: fraud-detection
    app.kubernetes.io/component: scoring-candidate
    app.kubernetes.io/part-of: fraud-detection-mlops
    fraud-detection/deployment-mode: shadow
spec:
  selector:
    app.kubernetes.io/name: fraud-detection
    app.kubernetes.io/component: scoring-candidate
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP

---
# ---------------------------------------------------------------------------
# Candidate Deployment
# ---------------------------------------------------------------------------
# Replace MODEL_VERSION with the version under evaluation.
# ---------------------------------------------------------------------------

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-scoring-candidate
  namespace: fraud-production
  labels:
    app.kubernetes.io/name: fraud-detection
    app.kubernetes.io/component: scoring-candidate
    app.kubernetes.io/part-of: fraud-detection-mlops
    fraud-detection/deployment-mode: shadow
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fraud-detection
      app.kubernetes.io/component: scoring-candidate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fraud-detection
        app.kubernetes.io/component: scoring-candidate
        fraud-detection/deployment-mode: shadow
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: fraud-scorer-candidate
          image: gcr.io/fraud-detection-mlops/scoring:candidate
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow.ml-infra.svc.cluster.local:5000"
            - name: MODEL_NAME
              value: "fraud-detection-xgb"
            - name: MODEL_VERSION
              value: "REPLACE_WITH_CANDIDATE_VERSION"
            - name: REVIEW_THRESHOLD
              value: "0.7"
            - name: BLOCK_THRESHOLD
              value: "0.9"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
