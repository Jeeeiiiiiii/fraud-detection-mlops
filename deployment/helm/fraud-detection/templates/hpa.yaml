# ---------------------------------------------------------------------------
# HPA: Enrichment Service
# ---------------------------------------------------------------------------
{{- if and .Values.enrichment.enabled .Values.enrichment.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "fraud-detection.fullname" . }}-enrichment
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "fraud-detection.enrichment.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "fraud-detection.fullname" . }}-enrichment
  minReplicas: {{ .Values.enrichment.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.enrichment.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.enrichment.autoscaling.targetCPUUtilizationPercentage }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
{{- end }}
---
# ---------------------------------------------------------------------------
# HPA: Scoring Service
# ---------------------------------------------------------------------------
# Scales on both CPU utilisation AND custom p99 latency metric to ensure
# the 50 ms SLA is maintained under load.
# ---------------------------------------------------------------------------
{{- if and .Values.scoring.enabled .Values.scoring.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "fraud-detection.fullname" . }}-scoring
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "fraud-detection.scoring.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "fraud-detection.fullname" . }}-scoring
  minReplicas: {{ .Values.scoring.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.scoring.autoscaling.maxReplicas }}
  metrics:
    # Primary metric: CPU utilisation
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.scoring.autoscaling.targetCPUUtilizationPercentage }}
    {{- if .Values.scoring.autoscaling.customMetrics.enabled }}
    # Secondary metric: p99 scoring latency (via Prometheus adapter)
    # Triggers scale-up when p99 latency exceeds the threshold, giving
    # headroom before the 50ms SLA is breached.
    - type: Pods
      pods:
        metric:
          name: {{ .Values.scoring.autoscaling.customMetrics.latencyMetric }}_p99
        target:
          type: AverageValue
          averageValue: "{{ .Values.scoring.autoscaling.customMetrics.latencyThresholdMs }}m"
    {{- end }}
  behavior:
    # Aggressive scale-up to handle traffic spikes (fraud attacks are bursty)
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
    # Conservative scale-down to avoid flapping
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
{{- end }}
